resource:
    name: MerchantOpeningHours
    shortName: merchant-opening-hours
    description: 'Opening hours schedule for a merchant'

    provider: Spryker\Glue\MerchantOpeningHoursRestApi\Api\Storefront\Provider\MerchantOpeningHoursStorefrontProvider

    paginationEnabled: false

    operations:
        - type: GetCollection
          uriTemplate: /merchants/{merchantReference}/merchant-opening-hours
          description: 'Retrieve opening hours for a merchant'
          uriVariables:
              merchantReference:
                  fromClass: MerchantsStorefrontResource

        # IRI-only operation. Shares the URI template with GetCollection above
        # so API Platform's IriConverter generates per-item self links of
        # /merchants/{merchantReference}/merchant-opening-hours instead of the
        # synthetic /merchant-opening-hours/{id} default. GetCollection is
        # registered first and serves all incoming requests; this Get route is
        # shadowed by the matcher and never invokes provideItem().
        - type: Get
          uriTemplate: /merchants/{merchantReference}/merchant-opening-hours
          description: 'Canonical IRI for merchant opening hours (resolved from the merchantReference identifier on the resource itself)'
          uriVariables:
              merchantReference:
                  identifiers: [merchantReference]

    includableIn:
        - resource: Merchants
          relationshipName: merchant-opening-hours
          uriVariableMappings:
              merchantReference: merchantReference

    properties:
        merchantReference:
            type: string
            identifier: true
            writable: false
            readable: true
            required: false
            description: 'Merchant reference identifier'
            openapiContext:
                example: 'MER000001'

        weekdaySchedule:
            type: array
            writable: false
            readable: true
            required: false
            description: 'Weekday schedule'
            openapiContext:
                example:
                    - day: 'monday'
                      timeFrom: '08:00:00'
                      timeTo: '18:00:00'
                    - day: 'tuesday'
                      timeFrom: '08:00:00'
                      timeTo: '18:00:00'

        dateSchedule:
            type: array
            writable: false
            readable: true
            required: false
            description: 'Specific-date schedule. Each item carries a date and optional time window. The noteGlossaryKey field, when present, is returned localized for the request locale.'
            openapiContext:
                example:
                    - date: '2046-12-25'
                      timeFrom: null
                      timeTo: null
                      noteGlossaryKey: 'Public holiday'
                    - date: '2046-12-31'
                      timeFrom: '08:00:00'
                      timeTo: '14:00:00'
                      noteGlossaryKey: null
